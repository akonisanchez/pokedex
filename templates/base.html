<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Pokédex{% endblock %}</title>

    <!-- Bootstrap CSS (CDN) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>

<body>
  <div class="dex-page">
    <div class="dex-device">

      <!-- Header-->
      <header class="dex-header">
        <div class="dex-brand">
          <span class="dex-dot"></span>
          <span class="dex-brand-title">Pokédex</span>
          <span class="dex-brand-sub">Scanner</span>
        </div>

        <nav class="dex-nav">
          <a class="dex-nav-btn" href="/">Search</a>
          <a class="dex-nav-btn" href="/favorites">Favorites</a>
          <a class="dex-nav-btn" href="/random">Wild Encounter</a>
        </nav>

        <div class="dex-auth">
          {% if session.get("user_id") %}
            <span class="dex-user">Trainer: {{ session.get("username") }}</span>
            <form action="/logout" method="post" class="m-0">
              <button class="dex-auth-btn" type="submit">Logout</button>
            </form>
          {% else %}
            <a class="dex-auth-btn" href="/login">Login</a>
            <a class="dex-auth-btn" href="/register">Register</a>
          {% endif %}
        </div>
      </header>

      <!-- Screen -->
      <div class="dex-screen-wrap">
        <div class="dex-screen">
          <main class="dex-screen-body">
            {% block content %}{% endblock %}
          </main>
        </div>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Pokédex{% endblock %}</title>

    <!-- Bootstrap CSS (CDN) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>

<body>
  <!-- Top navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark pokedex-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">Pokédex</a>

      <div class="d-flex gap-2 align-items-center">
        <a class="btn btn-light btn-sm" href="/">Search</a>
        <a class="btn btn-warning btn-sm" href="/favorites">Favorites</a>

        {% if session.get("user_id") %}
          <span class="text-white small ms-2">Hi, {{ session.get("username") }}!</span>
          <form action="/logout" method="post" class="m-0">
            <button class="btn btn-outline-light btn-sm ms-2" type="submit">Logout</button>
          </form>
        {% else %}
          <a class="btn btn-outline-light btn-sm ms-2" href="/login">Login</a>
          <a class="btn btn-outline-light btn-sm" href="/register">Register</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
